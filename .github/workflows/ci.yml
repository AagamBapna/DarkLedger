name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  ui-and-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python entrypoints
        run: |
          python -m py_compile agent/*.py deploy/scripts/seed_demo.py
